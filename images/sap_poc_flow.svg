<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Noto Sans TC', sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .label-main { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
    .label-sub  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .label-title{ font-size: 13px; font-weight: 600; fill: #2C2C2A; }
    .label-badge{ font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .section-label { font-size: 12px; font-weight: 600; fill: #444441; }
    .diagram-title { font-size: 15px; font-weight: 600; fill: #2C2C2A; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="820" fill="#FFFFFF"/>

<!-- ====== 標題 ====== -->
<text class="diagram-title" x="340" y="34" text-anchor="middle">SAP MCP 請購單 POC 三種情境</text>

<!-- ============================================================ -->
<!-- 情境一 外框 -->
<!-- ============================================================ -->
<rect x="20" y="52" width="640" height="220" rx="12" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="section-label" x="36" y="72">情境一　同仁工號 → 歷史單據 → 建立請購單</text>

<!-- 節點 1-1: 使用者輸入 (teal) -->
<rect x="40" y="86" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="label-main" x="110" y="109" text-anchor="middle">使用者輸入</text>
<text class="label-sub"  x="110" y="127" text-anchor="middle">提供工號或姓名</text>

<line x1="180" y1="112" x2="205" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 節點 1-2: search_requester (purple) -->
<rect x="206" y="86" width="152" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-main" x="282" y="109" text-anchor="middle">search_requester</text>
<text class="label-sub"  x="282" y="127" text-anchor="middle">確認申請人工號</text>

<line x1="358" y1="112" x2="383" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 節點 1-3: get_pr_history (purple) -->
<rect x="384" y="86" width="175" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-main" x="471" y="103" text-anchor="middle">get_pr_history</text>
<text class="label-sub"  x="471" y="121" text-anchor="middle">取得歷史請購單範例值</text>

<!-- 彎折箭頭 右→下→左 -->
<path d="M471 138 L471 162 L110 162 L110 185" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-purple)"/>

<!-- 節點 1-4: pr_create_pr (coral) -->
<rect x="40" y="186" width="140" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text class="label-main" x="110" y="209" text-anchor="middle">pr_create_pr</text>
<text class="label-sub"  x="110" y="227" text-anchor="middle">以範例值建立請購單</text>

<line x1="180" y1="212" x2="205" y2="212" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 回傳 badge (gray) -->
<rect x="208" y="196" width="120" height="32" rx="16" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text class="label-badge" x="268" y="216" text-anchor="middle">回傳 PR 號碼 ✓</text>

<!-- ============================================================ -->
<!-- 情境二 外框 -->
<!-- ============================================================ -->
<rect x="20" y="292" width="640" height="310" rx="12" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="section-label" x="36" y="312">情境二　依照步驟填寫欄位 → 逐步查詢 → 建立請購單</text>

<!-- 頂部 teal 欄位帶 -->
<rect x="40" y="322" width="600" height="40" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="label-title" x="340" y="346" text-anchor="middle">使用者依欄位逐步填寫（短文 / 申請人 / 交貨日 / 金額 / 成本中心 ...）</text>

<!-- 三條下箭頭 -->
<line x1="120" y1="362" x2="120" y2="389" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="362" x2="340" y2="389" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="560" y1="362" x2="560" y2="389" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 查詢節點 左 -->
<rect x="40" y="390" width="160" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-main" x="120" y="413" text-anchor="middle">search_cost_center</text>
<text class="label-sub"  x="120" y="431" text-anchor="middle">確認成本中心代碼</text>

<!-- 查詢節點 中 -->
<rect x="260" y="390" width="160" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-main" x="340" y="413" text-anchor="middle">search_pur_group</text>
<text class="label-sub"  x="340" y="431" text-anchor="middle">確認採購組代碼</text>

<!-- 查詢節點 右 -->
<rect x="480" y="390" width="160" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-main" x="560" y="413" text-anchor="middle">search_matl_group</text>
<text class="label-sub"  x="560" y="431" text-anchor="middle">確認物料群組代碼</text>

<!-- 三線匯集 -->
<line x1="120" y1="442" x2="120" y2="480" stroke="#7F77DD" stroke-width="0.8"/>
<line x1="340" y1="442" x2="340" y2="480" stroke="#7F77DD" stroke-width="0.8"/>
<line x1="560" y1="442" x2="560" y2="480" stroke="#7F77DD" stroke-width="0.8"/>
<line x1="120" y1="480" x2="560" y2="480" stroke="#7F77DD" stroke-width="0.8" fill="none"/>
<line x1="340" y1="480" x2="340" y2="499" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-purple)"/>

<!-- pr_create_pr 中間 -->
<rect x="220" y="500" width="240" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text class="label-main" x="340" y="523" text-anchor="middle">pr_create_pr</text>
<text class="label-sub"  x="340" y="541" text-anchor="middle">帶入完整欄位建立請購單</text>

<line x1="340" y1="552" x2="340" y2="571" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PR result badge -->
<rect x="252" y="572" width="176" height="30" rx="15" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text class="label-badge" x="340" y="591" text-anchor="middle">回傳 PR 號碼 ✓</text>

<!-- ============================================================ -->
<!-- 情境三 外框 -->
<!-- ============================================================ -->
<rect x="20" y="624" width="640" height="160" rx="12" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="section-label" x="36" y="644">情境三　直接貼範例值 → 建立請購單</text>

<!-- 使用者貼入 -->
<rect x="40" y="656" width="160" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="label-main" x="120" y="679" text-anchor="middle">使用者貼入</text>
<text class="label-sub"  x="120" y="697" text-anchor="middle">JSON / 表格範例值</text>

<line x1="200" y1="682" x2="259" y2="682" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- pr_create_pr -->
<rect x="260" y="656" width="160" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text class="label-main" x="340" y="679" text-anchor="middle">pr_create_pr</text>
<text class="label-sub"  x="340" y="697" text-anchor="middle">直接呼叫 FastAPI</text>

<line x1="420" y1="682" x2="479" y2="682" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- SAP RFC -->
<rect x="480" y="656" width="160" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="label-main" x="560" y="679" text-anchor="middle">SAP RFC</text>
<text class="label-sub"  x="560" y="697" text-anchor="middle">建立請購單 → PR 號碼</text>

<!-- 圖例 -->
<rect x="40" y="740" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="label-sub" x="60" y="752">使用者 / 輸入</text>
<rect x="160" y="740" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<text class="label-sub" x="180" y="752">MCP Masterdata Tools</text>
<rect x="340" y="740" width="14" height="14" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text class="label-sub" x="360" y="752">pr_create_pr (MCP)</text>
<rect x="510" y="740" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="label-sub" x="530" y="752">SAP / 結果</text>

<!-- 底部說明 -->
<text class="label-sub" x="340" y="800" text-anchor="middle">所有情境最終皆呼叫 FastAPI POST /pr/create → SAP RFC → 回傳 PR 號碼</text>

</svg>
